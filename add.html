<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add EQIM Token</title>
  <link rel="icon" href="eqim-logo-32.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <style>
    .wrap { max-width: 520px; margin: 24px auto; }
    .card-center { text-align: center; }
    .token-head {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 8px 0 16px;
    }
    .token-head img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--border);
    }
    .token-name { font-size: 20px; font-weight: 700; }
    .token-sub { color: var(--muted); font-size: 13px; }
    .addr {
      font-family: Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 16px;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .btn-mm { background: linear-gradient(135deg, #f6851b, #e2761b); color: #fff; }
    .btn-tw { background: linear-gradient(135deg, #3375bb, #0500ff); color: #fff; }
    .btn-copy { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      word-break: break-word;
    }
    .status.ok { display: block; border: 1px solid var(--ok); color: var(--ok); background: rgba(16,185,129,0.12); }
    .status.err { display: block; border: 1px solid #f43f5e; color: #f43f5e; background: rgba(244,63,94,0.12); }
    .hint-mini { margin-top: 14px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <main class="container wrap">
    <div class="card card-center">
      <h2>Add EQIM Token</h2>

      <div class="token-head">
        <img src="eqim-logo-32.svg" alt="EQIM">
        <div>
          <div class="token-name">EQI Main</div>
          <div class="token-sub">EQIM • BNB Smart Chain • 18</div>
        </div>
      </div>

      <div class="addr" id="addr">0x7aFc42cC3B8468d81e51d761f001Ea6a092A08A9</div>

      <div class="buttons">
        <button class="btn btn-mm" id="btn-mm">Add to MetaMask</button>
        <a class="btn btn-tw" id="btn-tw" href="#">Add to Trust Wallet</a>
        <button class="btn btn-copy" id="btn-copy">Copy Contract</button>
      </div>

      <div id="status" class="status"></div>
      <div class="hint-mini">Если токен уже был добавлен раньше без иконки, удалите его из списка и импортируйте заново этой страницей.</div>
    </div>
  </main>

  <script>
  (function () {
    var TOKEN = {
      address: "0x7aFc42cC3B8468d81e51d761f001Ea6a092A08A9",
      symbol: "EQIM",
      name: "EQI Main",
      decimals: 18,
      chainHex: "0x38",
      chainName: "BNB Smart Chain",
      icon: (location.origin && /^https?:/i.test(location.origin) ? location.origin : "https://eqi-coin.com") + "/eqim-logo-32.svg"
    };

    var addUrl = (location.origin && /^https?:/i.test(location.origin) ? location.origin : "https://eqi-coin.com") +
      "/add.html?address=" + TOKEN.address +
      "&symbol=" + TOKEN.symbol +
      "&name=" + encodeURIComponent(TOKEN.name) +
      "&decimals=" + TOKEN.decimals +
      "&image=" + encodeURIComponent(TOKEN.icon) +
      "&chainId=56";

    var mmDeepHttps = "https://metamask.app.link/dapp/" + addUrl.replace(/^https?:\/\//, "");
    var mmDeepScheme = "metamask://dapp/" + addUrl.replace(/^https?:\/\//, "");
    var twHttps = "https://link.trustwallet.com/add_asset?asset=c20000714_t" + TOKEN.address;
    var twScheme = "trust://add_asset?asset=c20000714_t" + TOKEN.address;

    var statusEl = document.getElementById("status");
    document.getElementById("btn-tw").href = twHttps;

    function showStatus(msg, ok) {
      statusEl.className = "status " + (ok ? "ok" : "err");
      statusEl.textContent = msg;
    }

    function getMetaMaskProvider() {
      var e = window.ethereum;
      if (!e) return null;
      if (e.providers && e.providers.length) {
        for (var i = 0; i < e.providers.length; i++) {
          if (e.providers[i].isMetaMask && !e.providers[i].isPhantom) return e.providers[i];
        }
      }
      if (e.isMetaMask && !e.isPhantom) return e;
      return null;
    }

    function getTrustProvider() {
      var e = window.ethereum;
      if (!e) return null;
      if (e.providers && e.providers.length) {
        for (var i = 0; i < e.providers.length; i++) {
          if (e.providers[i].isTrust || e.providers[i].isTrustWallet) return e.providers[i];
        }
      }
      if (e.isTrust || e.isTrustWallet) return e;
      return null;
    }

    function toPngDataUrl(iconUrl) {
      return fetch(iconUrl)
        .then(function (res) {
          if (!res.ok) throw new Error("Icon fetch failed");
          return res.blob();
        })
        .then(function (blob) {
          return new Promise(function (resolve, reject) {
            var blobUrl = URL.createObjectURL(blob);
            var img = new Image();
            img.onload = function () {
              try {
                var canvas = document.createElement("canvas");
                canvas.width = 256;
                canvas.height = 256;
                var ctx = canvas.getContext("2d");
                ctx.clearRect(0, 0, 256, 256);
                ctx.drawImage(img, 0, 0, 256, 256);
                URL.revokeObjectURL(blobUrl);
                resolve(canvas.toDataURL("image/png"));
              } catch (err) {
                URL.revokeObjectURL(blobUrl);
                reject(err);
              }
            };
            img.onerror = function (err) {
              URL.revokeObjectURL(blobUrl);
              reject(err);
            };
            img.src = blobUrl;
          });
        });
    }

    function ensureBsc(provider) {
      return provider.request({ method: "wallet_switchEthereumChain", params: [{ chainId: TOKEN.chainHex }] })
        .catch(function (e) {
          if (e && (e.code === 4902 || e.code === -32603)) {
            return provider.request({
              method: "wallet_addEthereumChain",
              params: [{
                chainId: TOKEN.chainHex,
                chainName: TOKEN.chainName,
                nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
                rpcUrls: ["https://bsc-dataseed1.binance.org"],
                blockExplorerUrls: ["https://bscscan.com"]
              }]
            });
          }
          throw e;
        });
    }

    function addMetaMask() {
      var mm = getMetaMaskProvider();
      if (!mm) {
        window.location.href = mmDeepScheme;
        setTimeout(function () { window.location.href = mmDeepHttps; }, 1000);
        return;
      }

      mm.request({ method: "eth_requestAccounts" })
        .catch(function () { return null; })
        .then(function () { return ensureBsc(mm).catch(function () { return null; }); })
        .then(function () { return toPngDataUrl(TOKEN.icon).catch(function () { return TOKEN.icon; }); })
        .then(function (iconForWallet) {
          return mm.request({
            method: "wallet_watchAsset",
            params: {
              type: "ERC20",
              options: {
                address: TOKEN.address,
                symbol: TOKEN.symbol,
                decimals: TOKEN.decimals,
                image: iconForWallet
              }
            }
          });
        })
        .then(function (ok) {
          if (ok === false) {
            showStatus("Cancelled by user.", false);
          } else {
            showStatus("Token add request sent to MetaMask with icon.", true);
          }
        })
        .catch(function (err) {
          var msg = (err && err.message) ? err.message : String(err);
          if (/exist|already/i.test(msg)) {
            showStatus("Token already exists in MetaMask. Remove and import again to refresh icon.", true);
            return;
          }
          showStatus("MetaMask error: " + msg, false);
        });
    }

    function addTrust() {
      var tw = getTrustProvider();
      if (tw) {
        tw.request({ method: "eth_requestAccounts" })
          .catch(function () { return null; })
          .then(function () { return ensureBsc(tw).catch(function () { return null; }); })
          .then(function () { return toPngDataUrl(TOKEN.icon).catch(function () { return TOKEN.icon; }); })
          .then(function (iconForWallet) {
            return tw.request({
              method: "wallet_watchAsset",
              params: {
                type: "ERC20",
                options: {
                  address: TOKEN.address,
                  symbol: TOKEN.symbol,
                  decimals: TOKEN.decimals,
                  image: iconForWallet
                }
              }
            });
          })
          .then(function (ok) {
            if (ok === false) showStatus("Cancelled by user.", false);
            else showStatus("Token added to Trust Wallet with icon!", true);
          })
          .catch(function () {
            window.location.href = twScheme;
            setTimeout(function () { window.location.href = twHttps; }, 900);
          });
        return;
      }
      window.location.href = twScheme;
      setTimeout(function () { window.location.href = twHttps; }, 900);
    }

    document.getElementById("btn-mm").addEventListener("click", function () {
      addMetaMask();
    });

    document.getElementById("btn-tw").addEventListener("click", function (e) {
      e.preventDefault();
      addTrust();
    });

    document.getElementById("btn-copy").addEventListener("click", function () {
      navigator.clipboard.writeText(TOKEN.address)
        .then(function () { showStatus("Contract copied.", true); })
        .catch(function () { showStatus("Copy failed.", false); });
    });

    // Auto-run if opened inside wallet browser.
    if (getMetaMaskProvider()) {
      setTimeout(addMetaMask, 300);
    } else if (getTrustProvider()) {
      setTimeout(addTrust, 300);
    }
  })();
  </script>
</body>
</html>
