<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добавить EQIM</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .wallet-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
    .wallet-buttons .btn { display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-size: 15px; padding: 14px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: transform 0.1s, box-shadow 0.15s; }
    .wallet-buttons .btn:active { transform: scale(0.97); }
    .btn-metamask { background: linear-gradient(135deg, #f6851b 0%, #e2761b 100%); color: #fff; border: none; box-shadow: 0 4px 16px rgba(246,133,27,0.3); }
    .btn-trust { background: linear-gradient(135deg, #3375bb 0%, #0500ff 100%); color: #fff; border: none; box-shadow: 0 4px 16px rgba(51,117,187,0.3); }
    .btn-any { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .wallet-icon { width: 22px; height: 22px; }
    .status-ok { background: rgba(16,185,129,0.1); border: 1px solid var(--ok); color: var(--ok); padding: 12px; border-radius: 10px; margin-top: 14px; }
    .status-err { background: rgba(244,63,94,0.1); border: 1px solid var(--warn); color: var(--warn); padding: 12px; border-radius: 10px; margin-top: 14px; }
    .status-info { background: rgba(139,92,246,0.1); border: 1px solid var(--primary); color: var(--text); padding: 12px; border-radius: 10px; margin-top: 14px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="container" style="max-width:520px;text-align:center">
    <h2 id="title">Добавление токена…</h2>

    <div class="token-preview" style="justify-content:center">
      <img id="icon" class="token-icon" alt="icon" style="width:48px;height:48px;border-radius:50%" />
      <div>
        <div class="preview-name" id="name">—</div>
        <div class="preview-symbol" id="symbol">—</div>
      </div>
    </div>

    <div id="addr" class="mono small" style="word-break:break-all;color:var(--muted);margin:8px 0 16px"></div>

    <div class="card" style="text-align:left;margin-bottom:16px">
      <h4>Данные для кошелька</h4>
      <div class="info-grid">
        <div><span>Сеть</span><b id="chain-label">—</b></div>
        <div><span>Symbol</span><b id="manual-symbol">—</b></div>
        <div><span>Decimals</span><b id="manual-decimals">—</b></div>
        <div><span>Contract</span><b id="manual-address" class="mono small">—</b></div>
      </div>
    </div>

    <div class="wallet-buttons">
      <button id="add-btn" class="btn btn-any">➕ Добавить в кошелёк (авто)</button>
      <a id="open-metamask-btn" class="btn btn-metamask">
        <svg class="wallet-icon" viewBox="0 0 35 33"><path d="M32.96 1l-13.14 9.72 2.45-5.73L32.96 1z" fill="#E2761B"/><path d="M2.66 1l13.02 9.82L13.35 4.99 2.66 1z" fill="#E4761B"/><path d="M28.23 23.53l-3.5 5.34 7.49 2.06 2.14-7.28-6.13-.12z" fill="#E4761B"/><path d="M1.27 23.65l2.13 7.28 7.47-2.06-3.48-5.34-6.12.12z" fill="#E4761B"/><path d="M10.47 14.51l-2.09 3.17 7.44.34-.26-8.01-5.09 4.5z" fill="#E4761B"/><path d="M25.15 14.51l-5.17-4.6-.17 8.11 7.44-.34-2.1-3.17z" fill="#E4761B"/><path d="M10.87 28.87l4.49-2.16-3.88-3.03-.61 5.19z" fill="#E4761B"/><path d="M20.27 26.71l4.47 2.16-.6-5.19-3.87 3.03z" fill="#E4761B"/></svg>
        Добавить в MetaMask
      </a>
      <a id="open-trust-btn" class="btn btn-trust">
        <svg class="wallet-icon" viewBox="0 0 40 40" fill="none"><path d="M20 4C20 4 33 9.5 33 14v9.5C33 30.5 20 36 20 36S7 30.5 7 23.5V14C7 9.5 20 4 20 4z" fill="#fff"/><path d="M20 7C20 7 30 11.5 30 15v8c0 5.5-10 10-10 10S10 28.5 10 23v-8C10 11.5 20 7 20 7z" fill="#3375BB"/></svg>
        Добавить в Trust Wallet
      </a>
    </div>

    <div id="status" class="hidden" style="margin-top:16px"></div>

    <p class="hint" id="hint" style="margin-top:18px;color:var(--muted);font-size:13px">
      Нажмите кнопку вашего кошелька. Для нового импорта MetaMask обычно подтягивает логотип, но уже сохранённый токен может остаться с системной иконкой.
    </p>
  </main>

  <script>
  (function () {
    const CHAINS = {
      56: {
        chainId: "0x38",
        chainName: "BNB Smart Chain",
        nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
        rpcUrls: [
          "https://bsc-rpc.publicnode.com",
          "https://bsc-dataseed.bnbchain.org",
          "https://bsc-dataseed1.binance.org",
          "https://binance.llamarpc.com",
        ],
        blockExplorerUrls: ["https://bscscan.com"],
      },
      97: {
        chainId: "0x61",
        chainName: "BNB Smart Chain Testnet",
        nativeCurrency: { name: "tBNB", symbol: "tBNB", decimals: 18 },
        rpcUrls: [
          "https://data-seed-prebsc-1-s1.binance.org:8545",
          "https://bsc-testnet-rpc.publicnode.com",
        ],
        blockExplorerUrls: ["https://testnet.bscscan.com"],
      },
    };

    const PUBLIC_BASE = /^https?:/i.test(location.origin) ? location.origin : "https://eqi-coin.com";
    const EQIM_HTTPS_ICON = `${PUBLIC_BASE}/logo.png`;

    const DEFAULT_TOKEN = {
      address: "0x7aFc42cC3B8468d81e51d761f001Ea6a092A08A9",
      symbol: "EQIM",
      name: "EQI Main",
      decimals: 18,
    };

    const q = new URLSearchParams(location.search);
    const address = (q.get("address") || DEFAULT_TOKEN.address).trim();
    const symbol = (q.get("symbol") || DEFAULT_TOKEN.symbol).slice(0, 11);
    const decimals = parseInt(q.get("decimals") || "18", 10);
    const name = q.get("name") || DEFAULT_TOKEN.name;
    let image = q.get("image") || "";
    const chainId = Number(q.get("chainId") || 56) === 97 ? 97 : 56;
    const chain = CHAINS[chainId];

    // Priority: query param (if valid HTTPS/data URI) → HTTPS CDN → data URI
    if (!image || !/^(https:\/\/|data:)/.test(image)) {
      image = EQIM_HTTPS_ICON;
    }
    let metamaskImagePromise = null;

    const $ = (id) => document.getElementById(id);
    $("name").textContent = name;
    $("symbol").textContent = symbol;
    $("addr").textContent = address;
    $("chain-label").textContent = chain.chainName;
    $("manual-symbol").textContent = symbol;
    $("manual-decimals").textContent = decimals;
    $("manual-address").textContent = address;
    $("icon").src = image;

    // Detect mobile
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    // --- Deep links ---
    // MetaMask deep link (opens in MetaMask app and triggers watchAsset)
    const thisPageUrl = location.href.replace(/^https?:\/\//i, "");
    const metamaskDeepLink = `https://metamask.app.link/dapp/${thisPageUrl}`;

    // Trust Wallet deep link — open this page inside TW DApp browser
    const trustDappLink = `https://link.trustwallet.com/open_url?coin_id=20000714&url=${encodeURIComponent(location.href)}`;

    // Trust Wallet direct add token (works on newer versions)
    // Format: trust://add_asset?asset=c<coin_id>_t<address>
    const trustDirectLink = `trust://add_asset?asset=c20000714_t${address}`;

    $("open-metamask-btn").href = metamaskDeepLink;
    $("open-trust-btn").href = trustDappLink;

    function setStatus(msg, type) {
      const s = $("status");
      s.className = "status-" + type; // ok, err, info
      s.innerHTML = msg;
    }

    function detectWallet(p) {
      if (!p) return "none";
      if (p.isTrust || p.isTrustWallet) return "trust";
      if (p.isTokenPocket || window.tokenpocket) return "tokenpocket";
      if (p.isCoinbaseWallet || p.isCoinbaseBrowser) return "coinbase";
      if (p.isMetaMask && !p.isPhantom) return "metamask";
      return "other";
    }

    function getProvider() {
      if (window.ethereum && window.ethereum.providers) {
        // Prefer MetaMask
        const mm = window.ethereum.providers.find(p => p.isMetaMask && !p.isPhantom);
        if (mm) return mm;
        // Then Trust
        const tw = window.ethereum.providers.find(p => p.isTrust || p.isTrustWallet);
        if (tw) return tw;
      }
      return window.ethereum || null;
    }

    async function getMetaMaskImage() {
      if (!metamaskImagePromise) {
        metamaskImagePromise = fetch(image)
          .then((response) => {
            if (!response.ok) throw new Error("logo fetch failed");
            return response.blob();
          })
          .then((blob) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          }))
          .catch(() => image);
      }
      return metamaskImagePromise;
    }

    async function getWalletImage(kind) {
      if (kind === "metamask") {
        return getMetaMaskImage();
      }
      return image;
    }

    async function requestWatchAsset(provider, options) {
      return provider.request({
        method: "wallet_watchAsset",
        params: { type: "ERC20", options },
      });
    }

    async function ensureChain(provider) {
      try {
        const cur = await provider.request({ method: "eth_chainId" });
        if (cur === chain.chainId) return;
      } catch (_) {}
      try {
        await provider.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: chain.chainId }],
        });
      } catch (e) {
        if (e && (e.code === 4902 || e.code === -32603)) {
          try {
            await provider.request({ method: "wallet_addEthereumChain", params: [chain] });
          } catch (_) {}
        }
      }
    }

    async function watchAsset(provider) {
      const opts = { address, symbol, decimals: Number(decimals) };
      const kind = detectWallet(provider);
      try {
        opts.image = await getWalletImage(kind);
        return await requestWatchAsset(provider, opts);
      } catch (error) {
        if (kind !== "metamask") throw error;
        // MetaMask sometimes refuses the request when a custom image is provided.
        return requestWatchAsset(provider, { address, symbol, decimals: Number(decimals) });
      }
    }

    // Force-update: some wallets support updating by calling watchAsset again with image
    async function forceUpdateIcon(provider) {
      const kind = detectWallet(provider);
      const primaryImage = await getWalletImage(kind);
      const icons = [primaryImage, EQIM_HTTPS_ICON].filter((value, index, arr) => arr.indexOf(value) === index);
      for (const icon of icons) {
        try {
          const result = await provider.request({
            method: "wallet_watchAsset",
            params: { type: "ERC20", options: { address, symbol, decimals: Number(decimals), image: icon } },
          });
          if (result || result === null) return result;
        } catch (e) {
          if (/exist|already/i.test((e.message || "").toString())) return true;
          continue;
        }
      }
      return false;
    }

    // Main add function — called when injected provider exists
    async function addToken() {
      const provider = getProvider();
      const kind = detectWallet(provider);

      if (!provider) {
        if (isMobile) {
          setStatus("Открываю кошелёк...", "info");
          window.location.href = trustDirectLink;
          setTimeout(() => { window.location.href = metamaskDeepLink; }, 2500);
        } else {
          setStatus("Установите MetaMask или Trust Wallet, затем нажмите кнопку кошелька.", "err");
        }
        return;
      }

      if (!address || !/^0x[0-9a-fA-F]{40}$/.test(address)) {
        setStatus("Некорректный адрес контракта.", "err");
        return;
      }

      try {
        await provider.request({ method: "eth_requestAccounts", params: [] });
      } catch (_) {}

      // Switch to BSC first
      await ensureChain(provider);

      // Attempt 1: watchAsset with data URI icon
      try {
        const ok = await watchAsset(provider);
        if (ok || ok === null) {
          setStatus("✅ Токен добавлен с иконкой!", "ok");
          return;
        }
        setStatus("Добавление отменено.", "err");
        return;
      } catch (err) {
        const msg = (err.message || err.code || "").toString();

        // Token already exists — try to force update icon
        if (/exist|already/i.test(msg)) {
          try {
            const ok2 = await forceUpdateIcon(provider);
            if (ok2 || ok2 === null) {
              setStatus("✅ Запрос на обновление токена отправлен. Если MetaMask всё ещё показывает стандартную иконку, удалите токен из списка и добавьте заново этой страницей.", "ok");
              return;
            }
          } catch (_) {}
          setStatus("✅ Токен уже есть в кошельке. MetaMask часто не меняет иконку у уже сохранённого кастомного токена: удалите токен и импортируйте заново.", "ok");
          return;
        }

        // Other errors — try with HTTPS icon
        try {
          const ok3 = await forceUpdateIcon(provider);
          if (ok3 || ok3 === null) {
            setStatus("✅ Токен добавлен. Если иконка не появилась в списке MetaMask, удалите токен и импортируйте его заново через эту страницу.", "ok");
            return;
          }
        } catch (err2) {
          const msg2 = (err2.message || "").toString();
          if (/exist|already/i.test(msg2)) {
            setStatus("✅ Токен уже есть в кошельке. Для MetaMask это обычно означает, что существующая запись сохранит старую системную иконку до повторного импорта.", "ok");
            return;
          }
          setStatus("Ошибка: " + msg2 + "<br>Удалите токен из кошелька и нажмите ещё раз.", "err");
        }
      }
    }

    // --- Button handlers ---

    // "Add to wallet" auto button
    $("add-btn").addEventListener("click", addToken);

    // MetaMask button
    $("open-metamask-btn").addEventListener("click", function (e) {
      const provider = getProvider();
      const kind = detectWallet(provider);

      // If MetaMask extension is available — use it directly (no deep link needed)
      if (provider && kind === "metamask") {
        e.preventDefault();
        addToken();
        return;
      }
      // Otherwise the <a> href deep link opens MetaMask app
    });

    // Trust Wallet button
    $("open-trust-btn").addEventListener("click", function (e) {
      const provider = getProvider();
      const kind = detectWallet(provider);

      // If Trust Wallet extension/in-app browser
      if (provider && kind === "trust") {
        e.preventDefault();
        addToken();
        return;
      }

      // On mobile: try direct trust:// link for one-tap add
      if (isMobile) {
        e.preventDefault();
        window.location.href = trustDirectLink;
        // Fallback to DApp browser link after 1.5s (if trust:// not handled)
        setTimeout(() => { window.location.href = trustDappLink; }, 1500);
        return;
      }
      // Desktop: the <a> href opens Trust Wallet DApp browser link
    });

    // --- Auto-add if inside wallet DApp browser ---
    if (window.ethereum) {
      const provider = getProvider();
      const kind = detectWallet(provider);
      if (kind === "metamask" || kind === "trust") {
        // Hide deep link buttons (already inside wallet)
        $("open-metamask-btn").classList.add("hidden");
        $("open-trust-btn").classList.add("hidden");
        $("add-btn").textContent = "➕ Добавить " + symbol;
        $("hint").textContent = "Нажмите кнопку — токен добавится с иконкой.";
        // Auto-trigger after small delay
        setTimeout(addToken, 500);
      }
    }
  })();
  </script>
</body>
</html>
